<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杯子放水重心运动模拟</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #controls {
            width: 300px;
            padding: 20px;
            border: 1px solid #eee;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        label { font-weight: bold; }
        input[type="range"] { width: 150px; }
        .m-value { font-weight: normal; color: #555; }
        #legend {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover { background-color: #0056b3; }
        #info {
            font-size: 14px;
            margin-top: 20px;
            width: 800px;
            text-align: center;
            color: #666;
            line-height: 1.5;
        }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<h1>杯子放水重心变化模拟</h1>

<div id="container">
    <canvas id="mainCanvas" width="500" height="600"></canvas>
    <canvas id="chartCanvas" width="300" height="600"></canvas>
</div>

<div id="controls">
    <div class="control-group">
        <label>杯子质量 $m_1$:</label>
        <span class="m-value" id="m1Val">100</span>
    </div>
    <input type="range" id="m1Slider" min="10" max="500" value="100">

    <div class="control-group">
        <label>水总质量 $m_2$:</label>
        <span class="m-value" id="m2Val">200</span>
    </div>
    <input type="range" id="m2Slider" min="50" max="1000" value="200">

    <button id="startBtn">开始放水</button>
    <button id="resetBtn">重置</button>

    <div id="legend">
        <div class="legend-item">
            <div class="color-box" style="background-color: red;"></div>
            <span>杯子重心 $C_1$ (固定於 $H/2$)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: blue;"></div>
            <span>水的重心 $C_2$ (随 $h$ 线性下降)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: #28a745;"></div>
            <span>综合重心 $C_{总}$ (先降后升)</span>
        </div>
        <div class="legend-item" style="color: purple;">
            <span>* 当前水面 $h$ (垂直坐标图中)</span>
        </div>
    </div>
</div>

<div id="info">
    在放水过程中，注意观察绿色曲线（综合重心）的运动轨迹。<br>
    当系统到达<span class="highlight">综合重心最低点</span>（也是水面刚好等于综合重心高度的瞬间），动画会自动暂停，方便你观察此时的状态。<br>
    点击「继续放水」可观察剩余过程，随着水越来越轻，综合重心又会被较重的空杯拉高。
</div>

<script>
    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const chartCanvas = document.getElementById('chartCanvas');
    const chartCtx = chartCanvas.getContext('2d');

    const m1Slider = document.getElementById('m1Slider');
    const m2Slider = document.getElementById('m2Slider');
    const m1ValDisp = document.getElementById('m1Val');
    const m2ValDisp = document.getElementById('m2Val');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 物理參數（用 Canvas 像素單位模擬）
    let H = 500; // 杯子像素高度
    let W = 120; // 杯子像素寬度
    let h = H;   // 初始水面高度
    let m1 = parseInt(m1Slider.value);
    let m2 = parseInt(m2Slider.value);
    
    // 杯子底部位置 (canvas 左下角)
    let cupBottomY = mainCanvas.height - 50; 
    let cupCenterX = mainCanvas.width / 2;

    // 動畫與暫停狀態
    let animating = false;
    let animationId;
    let drainSpeed = 1; // 像素/幀
    let hasPaused = false; // 標記是否已經在最低點暫停過
    let h_min = 0;         // 綜合質心最低時的水位高度

    // 軌跡數據點 (用來在圖表中繪製)
    let trailData = {
        h: [],
        c1: [],
        c2: [],
        ctotal: []
    };

    // --- 圖表繪製配置變數 (已修復：移至頂部以避免 ReferenceError) ---
    const chartPadding = { top: 30, right: 30, bottom: 50, left: 60 };
    const chartAreaWidth = chartCanvas.width - chartPadding.left - chartPadding.right;
    const chartAreaHeight = chartCanvas.height - chartPadding.top - chartPadding.bottom;

    // 計算綜合質心最低時的臨界水位高度 h_min
    function calculateHMin() {
        return ((Math.sqrt(m1 * m1 + m1 * m2) - m1) / m2) * H;
    }

    // 初始設置
    m1ValDisp.textContent = m1;
    m2ValDisp.textContent = m2;
    h_min = calculateHMin();
    updateTrail();
    drawScene();

    // 交互事件
    m1Slider.addEventListener('input', () => {
        m1 = parseInt(m1Slider.value);
        m1ValDisp.textContent = m1;
        resetAnimation();
    });
    m2Slider.addEventListener('input', () => {
        m2 = parseInt(m2Slider.value);
        m2ValDisp.textContent = m2;
        resetAnimation();
    });
    
    startBtn.addEventListener('click', () => {
        if (!animating) {
            animating = true;
            startBtn.textContent = '放水中...';
            startBtn.disabled = true;
            resetSliders(true);
            drainWater();
        }
    });
    
    resetBtn.addEventListener('click', resetAnimation);

    // ==========================================
    // 核心質心計算函數
    // ==========================================
    
    function getCenters(currentH, currentM1, currentM2) {
        const c1 = H / 2;
        const c2 = currentH / 2;
        const currentMw = (currentH / H) * currentM2;
        const totalMass = currentM1 + currentMw;
        let ctotal = 0;
        
        if (totalMass > 0) {
            ctotal = (currentM1 * (H / 2) + currentMw * (currentH / 2)) / totalMass;
        } else {
            ctotal = H / 2;
        }

        return { c1, c2, ctotal };
    }

    // ==========================================
    // 動畫和繪圖邏輯
    // ==========================================

    function resetAnimation() {
        if (animationId) cancelAnimationFrame(animationId);
        animating = false;
        hasPaused = false; // 重置暫停標記
        h_min = calculateHMin(); // 重新計算臨界水位
        startBtn.textContent = '開始放水';
        startBtn.disabled = false;
        resetSliders(false);
        h = H;
        trailData = { h: [], c1: [], c2: [], ctotal: [] };
        updateTrail();
        drawScene();
    }

    function resetSliders(disable) {
        m1Slider.disabled = disable;
        m2Slider.disabled = disable;
    }

    // 預計算軌跡數據
    function updateTrail() {
        trailData = { h: [], c1: [], c2: [], ctotal: [] };
        for (let th = H; th >= 0; th -= 2) {
            const centers = getCenters(th, m1, m2);
            trailData.h.push(th);
            trailData.c1.push(centers.c1);
            trailData.c2.push(centers.c2);
            trailData.ctotal.push(centers.ctotal);
        }
    }

    function drawScene() {
        mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        drawCupWithWater(h);
        drawStaticChart();
        drawChartDynamics(h);
    }

    function drawCupWithWater(waterHeight) {
        mainCtx.save();
        mainCtx.translate(cupCenterX - W / 2, cupBottomY - H);

        // 繪製空杯
        mainCtx.beginPath();
        mainCtx.lineWidth = 4;
        mainCtx.strokeStyle = '#333';
        mainCtx.moveTo(0, 0); 
        mainCtx.lineTo(0, H); 
        mainCtx.lineTo(W, H); 
        mainCtx.lineTo(W, 0); 
        mainCtx.stroke();

        // 繪製剩餘水
        if (waterHeight > 0) {
            mainCtx.fillStyle = 'rgba(0, 123, 255, 0.6)'; 
            mainCtx.fillRect(0, H - waterHeight, W, waterHeight);
        }

        // 繪製水流
        if (animating && waterHeight > 0 && waterHeight < H) {
            mainCtx.beginPath();
            mainCtx.lineWidth = 6;
            mainCtx.strokeStyle = 'rgba(0, 123, 255, 0.7)';
            mainCtx.moveTo(W, H - 20); 
            mainCtx.lineTo(W + 20, H + 30);
            mainCtx.stroke();
        }

        // 計算並繪製質心點
        const { c1, c2, ctotal } = getCenters(waterHeight, m1, m2);

        drawGuideLine(c1, 'rgba(255,0,0,0.3)');
        drawGuideLine(c2, 'rgba(0,0,255,0.3)');
        drawGuideLine(ctotal, 'rgba(40,167,69,0.3)');

        drawCMPoint(c1, 'red', 'm1 (杯子)');
        drawCMPoint(c2, 'blue', 'm2 (水)');
        drawCMPoint(ctotal, '#28a745', 'm总 (综合)');

        mainCtx.restore();
    }

    function drawCMPoint(y, color, label) {
        const pointY = H - y; 
        mainCtx.beginPath();
        mainCtx.arc(W / 2, pointY, 6, 0, Math.PI * 2);
        mainCtx.fillStyle = color;
        mainCtx.fill();
        mainCtx.strokeStyle = 'white';
        mainCtx.lineWidth = 2;
        mainCtx.stroke();

        mainCtx.fillStyle = color;
        mainCtx.font = '14px Arial';
        mainCtx.textAlign = 'right';
        mainCtx.fillText(label, W / 2 - 12, pointY + 4);
    }

    function drawGuideLine(y, color) {
        const lineY = H - y;
        mainCtx.beginPath();
        mainCtx.moveTo(0, lineY);
        mainCtx.lineTo(W, lineY);
        mainCtx.strokeStyle = color;
        mainCtx.lineWidth = 1;
        mainCtx.setLineDash([5, 5]); 
        mainCtx.stroke();
        mainCtx.setLineDash([]); 
    }

    // ==========================================
    // 圖表繪製邏輯
    // ==========================================

    function drawStaticChart() {
        chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
        
        chartCtx.save();
        chartCtx.translate(chartPadding.left, chartPadding.top + chartAreaHeight); 
        
        chartCtx.beginPath();
        chartCtx.strokeStyle = '#999';
        chartCtx.lineWidth = 2;
        chartCtx.moveTo(0, 0);
        chartCtx.lineTo(chartAreaWidth, 0); 
        chartCtx.moveTo(0, 0);
        chartCtx.lineTo(0, -chartAreaHeight); 
        chartCtx.stroke();

        chartCtx.font = '12px Arial';
        chartCtx.fillStyle = '#666';
        chartCtx.textAlign = 'center';
        chartCtx.fillText('0', 0, 15);
        chartCtx.fillText(`${H/2}`, chartAreaWidth / 2, 15);
        chartCtx.fillText(`${H} (满杯)`, chartAreaWidth, 15);
        chartCtx.fillText('水面高度 h', chartAreaWidth/2, 35);

        chartCtx.textAlign = 'right';
        chartCtx.fillText('0', -10, 0);
        chartCtx.fillText(`${H/2}`, -10, -chartAreaHeight / 2);
        chartCtx.fillText(`${H}`, -10, -chartAreaHeight);
        
        chartCtx.translate(0, -chartAreaHeight/2);
        chartCtx.save();
        chartCtx.rotate(-Math.PI / 2);
        chartCtx.fillText('重心垂直高度 (相对于杯底)', -10, -40); 
        chartCtx.restore();
        chartCtx.translate(0, chartAreaHeight/2); 

        drawChartLine(trailData.h, trailData.c1, 'red', 1);
        drawChartLine(trailData.h, trailData.c2, 'blue', 1);
        drawChartLine(trailData.h, trailData.ctotal, '#28a745', 2); 

        chartCtx.restore();
    }

    function drawChartLine(hData, cmData, color, width) {
        chartCtx.beginPath();
        for (let i = 0; i < hData.length; i++) {
            const x = (hData[i] / H) * chartAreaWidth; 
            const y = -(cmData[i] / H) * chartAreaHeight; 
            if (i === 0) chartCtx.moveTo(x, y);
            else chartCtx.lineTo(x, y);
        }
        chartCtx.strokeStyle = color;
        chartCtx.lineWidth = width;
        chartCtx.stroke();
    }

    function drawChartDynamics(currentH) {
        chartCtx.save();
        chartCtx.translate(chartPadding.left, chartPadding.top + chartAreaHeight);

        const { c1, c2, ctotal } = getCenters(currentH, m1, m2);
        
        const hX = (currentH / H) * chartAreaWidth;
        chartCtx.beginPath();
        chartCtx.moveTo(hX, 0);
        chartCtx.lineTo(hX, -chartAreaHeight);
        chartCtx.strokeStyle = 'purple';
        chartCtx.lineWidth = 1;
        chartCtx.stroke();
        
        chartCtx.fillStyle = 'purple';
        chartCtx.font = 'bold 12px Arial';
        chartCtx.fillText('*h', hX + 5, -chartAreaHeight + 10);

        drawPointOnChart(currentH, c1, 'red');
        drawPointOnChart(currentH, c2, 'blue');
        drawPointOnChart(currentH, ctotal, '#28a745');

        chartCtx.restore();
    }

    function drawPointOnChart(hVal, cmVal, color) {
        const x = (hVal / H) * chartAreaWidth;
        const y = -(cmVal / H) * chartAreaHeight;
        chartCtx.beginPath();
        chartCtx.arc(x, y, 5, 0, Math.PI * 2);
        chartCtx.fillStyle = color;
        chartCtx.fill();
        chartCtx.strokeStyle = 'white';
        chartCtx.lineWidth = 1;
        chartCtx.stroke();
    }

    // ==========================================
    // 動畫循環
    // ==========================================

    function drainWater() {
        if (!animating) return;

        // --- 新增邏輯：判斷是否達到最低點並暫停 ---
        if (!hasPaused && h <= h_min) {
            h = h_min; // 強制對齊到精確的最低點高度
            animating = false; // 暫停動畫
            hasPaused = true;  // 標記已經暫停過了
            
            // 改變按鈕狀態，允許繼續
            startBtn.textContent = '繼續放水';
            startBtn.disabled = false;
            
            drawScene(); // 繪製暫停的這一幀
            return;      // 跳出動畫迴圈
        }

        h -= drainSpeed;

        if (h <= 0) {
            h = 0;
            animating = false;
            startBtn.textContent = '重置';
            startBtn.disabled = false;
        }

        drawScene();

        if (animating) {
            animationId = requestAnimationFrame(drainWater);
        }
    }

</script>

</body>
</html>
